# Franka 数采 UI 配置 (UI 模式入口: scripts/core/run_record_hdf5_ui.py)
# 关键字段都在 record.* 下, 直接改这里, 重启 UI 生效.

record:
  repo_id: "local/franka_dataset"             # 数据集名称 (HF Hub 风格, 用户改自己的 huggingface hub repo_id, 如 yourname/your_dataset)
  debug: 0                                     # 调试模式 (0=真机)
  user_notes:                                  # 数采备注 (写 hdf5)
  fps: 15                                      # 录制帧率单一来源 (Hz); 相机/循环/写盘同源
  reset_between_episodes: false                # save 后是否自动调 robot.reset (false=用户手动点回 Home)
  reset_wait: 1.0                              # reset 后等待机械臂稳定时间 (秒)
  control_mode: &control_mode "unityvr"        # 控制模式 (当前仅支持 unityvr)
  color_preflight: true                        # 启动期色彩通道序预检 (BGR vs RGB)

  # hdf5 落盘目录 (UI 录制 .h5 存放位置)
  out_dir: "/home/ubuntu/Desktop/jhli/lerobot_franka_teleop/recordings"

  # AsyncEpisodeSaver 队列深度; 长 ep 写盘慢时排队的最大数量, 满则 submit 抛 QueueFullError
  async_saver_maxsize: 5

  ui:
    enabled: true                              # true → UI 模式; false → 键盘模式 (run_record_hdf5.py)
    host: "0.0.0.0"                           # Flask 绑定 (本机访问可改 127.0.0.1)
    port: 5055                                 # Flask 端口
    preview_max_w: 320                         # 预览图像最大宽 (px)
    preview_max_h: 240                         # 预览图像最大高 (px)
    preview_quality: 60                        # JPEG 预览压缩质量 (1-100)
    status_poll_hz: 30                         # 前端轮询参考 (前端 setInterval 写死 33ms)

  # 深度相机采集 (Phase D 占位, 当前未接通)
  depth:
    enabled: false

  # 高频关节状态采集 (Phase D 占位, 当前未接通)
  state_hifreq:
    enabled: false
    rate: 240

  # 控制器预检: 录制前幂等启动 joint impedance controller (防 polymetis 异步启失败)
  controller_preflight:
    enabled: true
    polymetis_python: "/home/ubuntu/Desktop/jhli/envs/polymetis-local/bin/python"
    polymetis_conda_prefix: "/home/ubuntu/Desktop/jhli/envs/polymetis-local"

  teleop:
    control_mode: *control_mode
    unityvr_config:
      use_gripper: &use_gripper True
      # 全局[位置, 姿态]标量增益 (每轴微调用 pos/rot_axis_gain)
      pose_scaler: [3.0, 2.0]
      channel_signs: [1, 1, 1, -1, -1, 1]     # [x,y,z,rx,ry,rz] 各轴符号
      oc2base_path: "/home/ubuntu/Desktop/jhli/lerobot_franka_teleop/.stage3_oc2arm_R.npy"
      robot_ip: "127.0.0.1"
      robot_port: 4242
      # 位置每轴增益 [x,y,z]; 叠加在 pose_scaler[0] 上, 仅缩放灵敏度不改方向 (§10.2(0))
      pos_axis_gain: [1.0, 1.0, 1.0]
      # 姿态每轴增益 [rx,ry,rz]; 叠加在 pose_scaler[1] 上, 不改方向
      rot_axis_gain: [2.0, 2.0, 2.0]
      # VR 食指扳机激活阈值 [0..1]; 高于此值开始发 delta_ee_pose
      trigger_threshold: 0.85
      # send_action EMA 平滑系数 (0..1); 越小越平滑, 越大越跟手
      smoothing_alpha: 0.4

  robot:
    ip: &ip "127.0.0.1"                       # zerorpc bridge IP (本机)
    use_gripper: *use_gripper
    close_threshold: 0.7                       # 夹爪判 open/close 阈值
    gripper_bin_threshold: 0.98                # 判夹爪已闭合的阈值
    gripper_reverse: false                     # 夹爪方向反转
    gripper_max_open: 0.0801                   # 夹爪最大开度 (m); franka hand 0.0801
    execute_mode: "ee_pose"                    # oculus 控制下的执行模式 (ee_pose / joint)
    # HOME 关节位姿 (rad, 7 维); '回 Home' 按钮 + episode 间自动 reset 用
    # 默认值是当前 Franka2 示教位姿, 换末端/工装重标后改这个数组
    home_joint_position: [-0.032383, 0.309742, -0.028457, -1.616216, 0.001244, 1.563408, 0.832192]

  task:
    description: "pick up the object and place it in the target zone"  # 改成自己的任务描述, 例: "pick up the Shanghai Green and put them into the brown basket"
    num_episodes: 1                            # UI 模式: 每次点开始录此数量条 (默认 1)

  time:
    episode_time_sec: 6000                     # 每 ep 最长时长 (秒)
    reset_time_sec: 6000                       # 自动 reset 最长等待 (秒)

  cameras:
    # 默认分辨率 640x480 (RealSense D435 支持模式; 见 https://intelrealsense.github.io/librealsense/doxygen/rs__sensor_8h.html)
    # ⚠️ lerobot RealSenseCamera 内置语义: 若 rotate_deg=90/270, capture 会自动反转 (width=480/height=640),
    # RealSense 不支持 480x640 模式 → "Couldn't resolve requests". rotate=90 时请改用 RealSense 支持的
    # 反向模式 (如 1280x720 + rotate=90 ok; 但 640x480 + rotate=90 不支持).
    width: 640                                 # 全局默认宽 (cam 硬件 capture 尺寸)
    height: 480                                # 全局默认高
    # 腕部相机 (跟随末端运动)
    wrist:
      serial: "419622073931"                  # 相机序列号
      width: 640                               # 分辨率 width
      height: 480                              # 分辨率 height
      fps: 15                                  # 帧率 Hz (建议与 record.fps 同源)
      rotate_deg: 0                            # 旋转角度 (0/90/180/270); 安装方向调整
    # 外部相机 (全局视角, 固定安装)
    exterior:
      serial: "233622075512"
      width: 640
      height: 480
      fps: 15
      rotate_deg: 0
    # 兼容旧字段 (旧代码读 wrist_cam_serial / exterior_cam_serial)
    wrist_cam_serial: "419622073931"
    exterior_cam_serial: "233622075512"
